apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: automation-reader
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - pods
      - namespaces
      - persistentvolumeclaims
      - persistentvolumes
      - services
      - endpoints
      - events
    verbs:
      - get
      - list
      - watch

  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs:
      - get
      - list
      - watch

  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs:
      - get
      - list
      - watch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: automation-reader
subjects:
  - kind: ServiceAccount
    name: automation-sa
    namespace: automation

roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: automation-reader