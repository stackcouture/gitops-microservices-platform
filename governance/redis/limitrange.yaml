apiVersion: v1
kind: LimitRange
metadata:
  name: redis-limits
  namespace: redis
spec:
  limits:
  - type: Container
    defaultRequest:
      cpu: 250m
      memory: 256Mi

    default:
      cpu: 500m
      memory: 512Mi

    min:
      cpu: 100m
      memory: 128Mi

    max:
      cpu: "2"
      memory: 4Gi