apiVersion: v1
kind: LimitRange
metadata:
  name: monitoring-limits
  namespace: monitoring
spec:
  limits:
  - type: Container

    defaultRequest:
      cpu: 200m
      memory: 256Mi

    default:
      cpu: 1
      memory: 1Gi

    min:
      cpu: 100m
      memory: 128Mi

    max:
      cpu: "4"
      memory: 8Gi