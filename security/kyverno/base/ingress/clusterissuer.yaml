apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: clusterissuer-security
spec:
  validationFailureAction: Enforce
  background: true

  rules:

  # Validate ClusterIssuer configuration
  - name: validate-letsencrypt-prod-clusterissuer
    match:
      any:
      - resources:
          kinds:
          - ClusterIssuer

    validate:
      message: "ClusterIssuer must use approved production configuration."
      pattern:
        metadata:
          name: letsencrypt-prod

        spec:
          acme:
            server: "https://acme-v02.api.letsencrypt.org/directory"

            privateKeySecretRef:
              name: letsencrypt-prod

            solvers:
            - dns01:
                cloudflare:
                  apiTokenSecretRef:
                    name: cloudflare-api-token-secret
                    key: api-token

  # Block updates after creation
  - name: prevent-clusterissuer-modification
    match:
      any:
      - resources:
          kinds:
          - ClusterIssuer

    preconditions:
      all:
      - key: "{{ request.operation }}"
        operator: Equals
        value: UPDATE

    validate:
      message: "ClusterIssuer modifications are not allowed. Manage through GitOps."
      deny: {}

  # Block deletion except by cluster-admins
  - name: protect-clusterissuer-deletion
    match:
      any:
      - resources:
          kinds:
          - ClusterIssuer

    preconditions:
      all:
      - key: "{{ request.operation }}"
        operator: Equals
        value: DELETE

    validate:
      message: "ClusterIssuer deletion is restricted."
      deny:
        conditions:
          all:
          - key: "{{ request.userInfo.username }}"
            operator: NotEquals
            value: "system:admin"