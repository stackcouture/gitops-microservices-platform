apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: generate-default-deny-networkpolicy
spec:
  background: true

  rules:
  - name: create-default-deny-networkpolicy
    match:
      any:
      - resources:
          kinds:
          - Namespace

    preconditions:
      all:
      - key: "{{ request.object.metadata.labels.\"namespace-type\" || '' }}"
        operator: AnyIn
        value:
        - application
        - cache
        - database

    generate:
      synchronize: true

      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      name: default-deny
      namespace: "{{ request.object.metadata.name }}"

      data:
        metadata:
          labels:
            managed-by: kyverno

        spec:
          podSelector: {}
          policyTypes:
          - Ingress
          - Egress