apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resource-requests-limits
spec:
  validationFailureAction: Enforce
  background: true

  rules:
    - name: require-resource-requests-limits
      match:
        any:
          - resources:
              kinds:
                - Deployments 

      exclude:
        any:
          - resources:
              namespaces:
                - vote

      validate:
        message: "All containers must define CPU and memory requests and limits."
        foreach:
          - list: "request.object.spec.containers"
            pattern:
              resources:
                requests:
                  cpu: "?*"
                  memory: "?*"
                limits:
                  cpu: "?*"
                  memory: "?*"