apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: result-route
  namespace: vote
spec:
  parentRefs:
  - name: result-gateway

  hostnames:
  - resulting.local

  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
        
    backendRefs:
    - name: result
      port: 80