apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-stackcouture-staging
  namespace: nginx-gateway
spec:
  secretName: wildcard-stackcouture-staging-tls

  issuerRef:
    name: letsencrypt-staging
    kind: ClusterIssuer

  dnsNames:
  - stackcouture.online
  - "*.stackcouture.online"