apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kubecost-ingress
  namespace: kubecost
  labels:
    environment: dev
spec:
  ingressClassName: nginx

  tls:
  - hosts:
    - kubecost.stackcouture.online
    secretName: wildcard-stackcouture-tls

  rules:
    - host: kubecost.stackcouture.online
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kubecost-cost-analyzer
                port:
                  number: 9090