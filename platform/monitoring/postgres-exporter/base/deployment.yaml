apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: postgres
  labels:
    app: postgres-exporter
spec:
  replicas: 1

  selector:
    matchLabels:
      app: postgres-exporter

  template:
    metadata:
      labels:
        app: postgres-exporter
    spec:
      containers:
      - name: postgres-exporter
        image: prometheuscommunity/postgres-exporter:v0.17.1

        env:
        - name: DATA_SOURCE_URI
          value: "db.postgres.svc.cluster.local:5432/postgres?sslmode=disable"

        - name: DATA_SOURCE_USER
          value: "postgres"

        - name: DATA_SOURCE_PASS
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD

        ports:
        - containerPort: 9187
          name: metrics

        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 256Mi

        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL