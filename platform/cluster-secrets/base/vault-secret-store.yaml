apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-secret-store
spec:
  provider:
    vault:
      server: "http://vault-active.vault.svc.cluster.local:8200"

      path: "kv"

      version: "v2"

      auth:
        kubernetes:
          mountPath: kubernetes
          role: postgres-role

          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets