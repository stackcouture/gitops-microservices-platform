apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
  namespace: cert-manager
spec:
  secretStoreRef:
    name: vault-secret-store
    kind: ClusterSecretStore
    
  target:
    name: cloudflare-api-token-secret

  data:
  - secretKey: api-token
    remoteRef:
      key: cloudflare
      property: api-token