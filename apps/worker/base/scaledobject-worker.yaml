apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: worker-scaler
  namespace: vote
spec:
  scaleTargetRef:
    name: worker

  pollingInterval: 15
  cooldownPeriod: 120

  minReplicaCount: 1
  maxReplicaCount: 20

  fallback:
    failureThreshold: 3
    replicas: 2

  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 0
          policies:
            - type: Percent
              value: 100
              periodSeconds: 60
        scaleDown:
          stabilizationWindowSeconds: 120
          policies:
            - type: Percent
              value: 50
              periodSeconds: 60

  triggers:
    - type: redis
      metadata:
        address: redis.vote.svc.cluster.local:6379
        listName: votes
        listLength: "50"