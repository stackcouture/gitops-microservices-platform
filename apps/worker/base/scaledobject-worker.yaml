apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: worker-scaler
  namespace: vote
spec:
  scaleTargetRef:
    name: worker

  pollingInterval: 5
  cooldownPeriod: 30

  minReplicaCount: 0
  maxReplicaCount: 10

  fallback:
    failureThreshold: 3
    replicas: 0

  triggers:
    - type: redis
      metadata:
        address: redis.vote.svc.cluster.local:6379
        listName: votes
        listLength: "25"