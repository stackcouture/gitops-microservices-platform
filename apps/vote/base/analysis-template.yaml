apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: vote-traffic-check
  namespace: vote
  labels:
    environment: dev

spec:
  metrics:
    - name: request-rate
      interval: 30s
      count: 1
      failureLimit: 1

      successCondition: len(result) > 0 && result[0] >= 1

      provider:
        prometheus:
          address: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090

          query: |
            sum(
              up{job="vote-canary"}
            )