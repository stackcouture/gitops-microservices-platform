apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: result
  namespace: argo-demo
  labels:
    app: result
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: result
  template:
    metadata:
      labels:
        app: result
    spec:
      containers:
        - name: result
          image: asia-south1-docker.pkg.dev/project-18ee516c-a108-431d-a73/vote-docker-repo/result
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
  strategy:
    canary:
      maxSurge: 1
      maxUnavailable: 0
      steps:
        - setWeight: 20
        - pause:
            duration: 30s
        - analysis:
            templates:
              - templateName: result-traffic-check

        - setWeight: 50
        - pause:
            duration: 30s
        - analysis:
            templates:
              - templateName: result-traffic-check

        - setWeight: 100
