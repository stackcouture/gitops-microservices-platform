apiVersion: argoproj.io/v1alpha1
kind: Rollout

metadata:
  name: result
  namespace: vote
  labels:
    app: result
    environment: dev

spec:
  replicas: 2
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 600

  strategy:
    blueGreen:
      activeService: result-active-svc 
      previewService: result-preview-svc 
      autoPromotionEnabled: false
      scaleDownDelaySeconds: 30
  selector:
    matchLabels:
      app: result
  template:
    metadata:
      labels:
        app: result

      annotations:
        reloader.stakater.com/auto: "true"

    spec:
      serviceAccountName: result-sa
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60

      tolerations:
      - key: workload
        operator: Equal
        value: app
        effect: NoSchedule

      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 2000
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: result
          image: asia-south1-docker.pkg.dev/project-18ee516c-a108-431d-a73/vote-docker-repo/result
          imagePullPolicy: IfNotPresent
          
          ports:
            - name: result
              containerPort: 8080

          env:
            - name: DB_HOST
              value: 10.160.96.5

            - name: POSTGRES_USER
              value: votingapp

            - name: POSTGRES_DB
              value: votingdb

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DB_PASSWORD

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"

          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          volumeMounts:
            - name: tmp
              mountPath: /tmp
      
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: workload
                    operator: In
                    values:
                      - app
                  - key: pool
                    operator: In
                    values:
                      - app

        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: result

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: result

      
      volumes:
      - name: tmp
        emptyDir: {}
  
