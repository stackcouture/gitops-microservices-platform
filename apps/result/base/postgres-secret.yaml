apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-secret
  namespace: vote

spec:
  refreshInterval: 1h

  secretStoreRef:
    name: gcp-cluster-secret-store
    kind: ClusterSecretStore

  target:
    name: postgres-secret
    creationPolicy: Owner

  data:
  - secretKey: POSTGRES_PASSWORD
    remoteRef:
      key: postgres
      property: POSTGRES_PASSWORD