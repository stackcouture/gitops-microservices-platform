apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: vote
  namespace: argo-demo
spec:
  replicas: 3
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: vote
  template:
    metadata:
      labels:
        app: vote
    spec:
      containers:
        - name: vote
          image: asia-south1-docker.pkg.dev/project-18ee516c-a108-431d-a73/vote-docker-repo/vote
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
  strategy:
    canary:
      maxSurge: 1
      maxUnavailable: 0
      steps:
        - setWeight: 20
        - pause:
            duration: 30s
        - analysis:
            templates:
              - templateName: vote-traffic-check

        - setWeight: 50
        - pause:
            duration: 30s
        - analysis:
            templates:
              - templateName: vote-traffic-check

        - setWeight: 100
