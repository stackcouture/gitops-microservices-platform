apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway-api
  namespace: argocd
spec:
  project: gateway-api

  source:
    repoURL: https://github.com/stackcouture/gitops-microservices-platform.git
    targetRevision: main
    path: platform/gateway-api

  destination:
    server: https://kubernetes.default.svc
    namespace: nginx-gateway

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
    - CreateNamespace=true